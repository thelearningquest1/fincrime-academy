  body:`A remittance firm sent payments to many countries, including some high-risk corridors. Its BWRA initially rated everything 'medium' to avoid hard conversations — a classic mistake.<br><br>The FCA's view: a credible BWRA must differentiate. Corridors to higher-risk jurisdictions carry higher inherent risk; controls (enhanced monitoring, corridor limits, EDD on larger senders) reduce it to a residual level the firm can accept. Where residual risk exceeded appetite, the firm restricted or exited specific corridors — a documented, risk-based decision rather than blanket de-risking.<br><br>Rewriting the BWRA to show inherent risk, controls and residual risk per corridor turned a vague document into a tool that actually guided operations.`,

  {q:"How would you risk-rate a customer?",a:"I'd look at the standard factors: customer type and behaviour, product or service, geography, delivery channel, and transaction patterns. Each contributes to a score that maps to low, medium or high, and some factors — like a sanctions match or high-risk-country residency — can override to high. The rating then drives how much due diligence I apply and how closely I monitor, and I make sure I can explain the 'why' behind it."},

 reading:[
  {h:"Transaction monitoring 101",b:`<p><strong>Transaction monitoring (TM)</strong> is the ongoing screening of customer activity to detect patterns that might indicate money laundering, fraud or other crime. It's mostly automated: <strong>rules</strong> (or 'scenarios') look for defined patterns and raise <strong>alerts</strong> for a human to review.</p>
   <p>Examples of rules: a sudden spike above a customer's normal activity; rapid in-and-out movement; lots of small inbound payments from unrelated parties (mule pattern); transactions just under a reporting threshold (structuring); activity inconsistent with the stated profile.</p>
   <p>Monitoring can be <strong>real-time</strong> (before/at the point a payment is made — can block it) or <strong>post-event</strong> (reviewed after, in batches).</p>
   <div class="why"><b>Why this is where you'll start your career</b>Most entry-level financial-crime jobs involve working an alert queue. Master the alert lifecycle and you're employable. The rest of the course exists to help you make good decisions on those alerts.</div>`},
  {h:"A field guide to red flags",b:`<p>Red flags are observable signals that warrant a closer look. None alone proves wrongdoing — they prompt questions. Common ones in fintech:</p>
   <ul>
   <li><strong>Velocity</strong> — money in and straight out again ('pass-through'), or unusually rapid movement.</li>
   <li><strong>Structuring</strong> — multiple amounts just under thresholds.</li>
   <li><strong>Inconsistency</strong> — activity that doesn't fit the customer's stated profile or income.</li>
   <li><strong>Third-party funding</strong> — inbound from many unrelated people (mule hallmark).</li>
   <li><strong>Geography</strong> — links to high-risk or sanctioned jurisdictions.</li>
   <li><strong>Round-number / repetitive</strong> patterns, or transactions with no economic rationale.</li>
   <li><strong>Reluctance</strong> — customer won't explain a transaction or provide CDD information.</li>
   </ul>
   <div class="why"><b>Why context beats checklists</b>A £9,000 deposit is normal for a car dealer and bizarre for a student. Red flags only mean something <em>relative to the customer's expected profile</em> — which is why good CDD (Weeks 6–7) makes good monitoring possible.</div>`},
  {h:"From alert to decision",b:`<p>Working an alert follows a repeatable lifecycle:</p>
   <ol>
   <li><strong>Triage</strong> — is this obviously a false positive, or does it need investigation?</li>
   <li><strong>Gather</strong> — pull the customer profile, CDD, prior alerts, transaction history.</li>
   <li><strong>Analyse</strong> — does the activity make sense given what you know? What's the plausible explanation vs the suspicious one?</li>
   <li><strong>Decide</strong> — close (with rationale), request information, or <strong>escalate</strong> to the MLRO as an internal SAR.</li>
   <li><strong>Document</strong> — write a clear narrative: what triggered it, what you found, what you concluded, and why.</li>
   </ol>
   <div class="why"><b>Why documentation is the job</b>The decision matters, but the <em>written rationale</em> is what protects the firm and enables the next analyst (or a regulator) to understand it. 'Closed — no concern' with no reasoning is a finding waiting to happen.</div>`}
 ],

 caseStudy:{firm:"Alert backlog at a scaling neobank",type:"Neobank",
  body:`A neobank's customer growth outpaced its financial-crime team. Transaction-monitoring alerts piled into a backlog of thousands. Under pressure to hit closure targets, analysts began clearing alerts quickly with thin rationales like 'no concern'.<br><br>Some genuinely suspicious activity slipped through. When examined, the firm couldn't demonstrate that alerts had been properly investigated — the narratives were empty. The regulator viewed the backlog and poor-quality dispositions as evidence of ineffective systems and controls.<br><br>The fix combined people (more analysts), process (clear investigation standards and QA), and technology (better-tuned rules to cut false positives so real alerts got attention). Quality of decision-making — not just speed — became the measure.`,
  lessons:["Growth without monitoring capacity creates dangerous backlogs.","Closure targets without quality standards encourage thin, indefensible dispositions.","A disposition is only as good as its written rationale.","Tuning rules to reduce false positives lets analysts focus on real risk."]},

 reflection:"Walk an imaginary alert through the five lifecycle steps (triage → gather → analyse → decide → document). Then list five red flags and why each matters.",
 interview:[
  {q:"How would you work a transaction-monitoring alert?",a:"I'd triage it to rule out obvious false positives, then gather the customer profile, CDD and transaction history. I'd analyse whether the activity makes sense given what we know — comparing the innocent explanation against the suspicious one. Then I'd decide: close with a documented rationale, request more information, or escalate to the MLRO as an internal SAR. Throughout I'd write a clear narrative and avoid tipping off the customer."},
  {q:"Give me some red flags you'd look for.",a:"Velocity or pass-through — money in and straight out; structuring just under thresholds; activity inconsistent with the customer's stated income or profile; inbound from many unrelated third parties, which suggests a mule; links to high-risk jurisdictions; and reluctance to explain transactions or provide information. None proves anything alone — they're prompts to investigate in the context of the customer's expected behaviour."},
  {q:"What makes a good alert disposition?",a:"A clear, evidenced narrative: what triggered the alert, what I reviewed, what the activity was, the plausible versus suspicious explanations, and my reasoned conclusion. Whether I close or escalate, someone else — a colleague or a regulator — should be able to read it and understand exactly why. 'No concern' with no reasoning is indefensible."}

 reading:[
  {h:"The Suspicious Activity Report",b:`<p>A <strong>Suspicious Activity Report (SAR)</strong> is the formal report a firm submits to the <strong>NCA's UK Financial Intelligence Unit</strong> when it knows or suspects (or has reasonable grounds to suspect) money laundering or terrorist financing.</p>
   <p>The flow inside a firm:</p>
   <ol><li>An analyst spots suspicion and raises an <strong>internal SAR</strong> to the <strong>MLRO</strong> (or nominated officer).</li><li>The MLRO reviews it and decides whether to submit an <strong>external SAR</strong> to the NCA.</li><li>The NCA's UKFIU receives it, may share it with law enforcement, and uses it as intelligence.</li></ol>
   <p>SARs are a cornerstone of the UK system: hundreds of thousands are filed each year, feeding intelligence that supports investigations, asset recovery and disruption of crime.</p>
   <div class="why"><b>Why your narrative matters to a real investigation</b>The UKFIU and police can't act on a vague report. A clear SAR with the right detail can trigger action; a muddled one may be unusable. Your writing has real-world consequences.</div>`},
  {h:"How to write a SAR narrative",b:`<p>A good SAR narrative is clear, factual and structured. A widely-taught approach answers the basics: <strong>who, what, where, when, why and how</strong> — plus what you want to happen.</p>
   <ul>
   <li><strong>Who</strong> — the subject(s): names, identifiers, account details, role.</li>
   <li><strong>What</strong> — the activity and amounts, in plain chronological terms.</li>
   <li><strong>Why</strong> — why it's suspicious: the specific red flags and the gap between expected and observed behaviour.</li>
   <li><strong>So what</strong> — what you're asking (e.g. reporting for intelligence, or seeking a defence/DAML to proceed).</li>
   </ul>
   <p>Write facts, not adjectives. 'Received £61,000 from 14 unrelated individuals over 10 days, immediately transferred out' beats 'lots of suspicious activity'. Use glossary-style clarity, avoid jargon the reader won't share, and never include your opinion as if it were fact.</p>
   <div class="why"><b>Why clarity is a job skill, not a nicety</b>Interviewers ask candidates to describe how they'd structure a SAR. Demonstrating a clear who/what/why/so-what method instantly signals you understand the analyst's core output.</div>`},
  {h:"Defence against money laundering (DAML)",b:`<p>Sometimes a firm wants to proceed with a transaction it suspects involves criminal property — but doing so could be a POCA offence (e.g. s.328). The solution is to seek a <strong>defence</strong> (often called <strong>consent</strong>, or a <strong>DAML</strong> — Defence Against Money Laundering) by submitting a SAR and asking the NCA's permission to proceed.</p>
   <p>The timeline:</p>
   <ul>
   <li>After requesting a defence, there is a <strong>7-working-day notice period</strong>. If the NCA doesn't refuse within it, the firm may proceed.</li>
   <li>If the NCA <strong>refuses</strong> consent, a <strong>31-calendar-day moratorium period</strong> begins, giving law enforcement time to investigate or restrain the funds.</li>
   </ul>
   <div class="why"><b>Why the clock exists</b>The notice and moratorium balance two needs: letting legitimate business continue, and giving the authorities a window to act before money disappears. Knowing these numbers (7 working days / 31 calendar days) is a classic interview detail.</div>`}
 ],

 caseStudy:{firm:"A DAML decision at a payments firm",type:"Payment Institution",
  body:`A payments firm received a customer instruction to release £120,000 it suspected was linked to fraud proceeds. Processing it could expose the firm to a POCA s.328 'arrangements' offence. Declining outright might tip off the customer and let funds move elsewhere.<br><br>The MLRO submitted a SAR <strong>requesting a defence (DAML)</strong>, clearly setting out the suspicion. The firm held the transaction during the 7-working-day notice period. The NCA refused consent, triggering the 31-calendar-day moratorium, during which law enforcement took steps to restrain the funds.<br><br>The firm's careful, documented handling — report, seek defence, wait, avoid tipping off — protected it legally and supported a real investigation. A rushed release, or an unexplained refusal, could have caused harm.`,

 reading:[
  {h:"The three lines of defence",b:`<p>The <strong>three lines of defence (3LoD)</strong> is how firms structure responsibility for managing risk:</p>
   <ul>
   <li><strong>First line</strong> — the business that owns and manages the risk day-to-day: onboarding, operations, the analysts working alerts. They run the controls.</li>
   <li><strong>Second line</strong> — risk and compliance functions that set policy, advise, and oversee/challenge the first line. The MLRO sits here.</li>
   <li><strong>Third line</strong> — internal audit, providing independent assurance to the board that lines one and two actually work.</li>
   </ul>
   <div class="why"><b>Why separation matters</b>If the people doing the work also marked their own homework and audited themselves, problems would stay hidden. Independence between the lines is what makes the model trustworthy — and it's a favourite interview topic.</div>`},
  {h:"Who's accountable? SM&CR",b:`<p>The <strong>Senior Managers and Certification Regime (SM&CR)</strong> makes individuals personally accountable. Senior managers hold defined <strong>responsibilities</strong> (set out in a 'statement of responsibilities'), and there's a specific senior-management function for money-laundering reporting responsibility.</p>
   <p>Under the <strong>Duty of Responsibility</strong>, a senior manager can be held accountable if a breach happens in their area and they didn't take reasonable steps to prevent it. The <strong>Certification Regime</strong> covers other staff whose roles could cause significant harm, who must be certified as fit and proper. <strong>Conduct Rules</strong> apply broadly.</p>
   <div class="why"><b>Why this changes behaviour</b>Before SM&CR, accountability could evaporate into 'the firm'. Now a named person owns financial-crime responsibility — which is exactly why EDD and higher-risk decisions need senior approval (Week 7).</div>`},
  {h:"Crypto, open banking, PSRs & EMRs",b:`<p>Fintech business models carry distinctive risks and sit under specific regimes:</p>
   <ul>
   <li><strong>Crypto</strong> — pseudonymity, speed, cross-border reach and chain-hopping raise inherent ML risk. UK cryptoasset businesses must <strong>register with the FCA</strong> under the MLRs and meet AML obligations.</li>
   <li><strong>Open banking</strong> — account-to-account access and rapid payment initiation can speed up fraud and laundering if controls lag.</li>
   <li><strong>Payment services</strong> — governed by the <span class="statute">PSRs 2017</span> (Payment Services Regulations); fast, often cross-border payment flows.</li>
   <li><strong>E-money</strong> — governed by the <span class="statute">EMRs 2011</span> (Electronic Money Regulations); prepaid products and wallets can be exploited for anonymity if limits/controls are weak.</li>
   </ul>
   <div class="why"><b>Why the regime matters as much as the tech</b>Knowing a firm is an EMI (EMRs) vs a payment institution (PSRs) vs a registered cryptoasset business (MLRs) tells you which rules bite and what the FCA expects. That vocabulary makes you sound like an insider.</div>`}
 ],

 reading:[

  {h:"What employers really test",b:`<p>Entry-level financial-crime roles test a consistent set of skills. Prepare evidence for each:</p>
   <ul>
   <li><strong>Attention to detail</strong> — spotting the one wrong field; not clearing alerts carelessly.</li>
   <li><strong>Sound judgement</strong> — weighing innocent vs suspicious explanations; proportionate decisions.</li>
   <li><strong>Clear writing</strong> — defensible dispositions and SAR narratives.</li>
   <li><strong>Risk thinking</strong> — applying the risk-based approach instinctively.</li>
   <li><strong>Integrity & resilience</strong> — doing the right thing under pressure and target-driven environments.</li>
   <li><strong>Curiosity</strong> — asking 'what's the predicate offence?' and following the money.</li>
   </ul>
   <div class="why"><b>Why this matters more than memorised law</b>Firms will train you on their systems. They're hiring for judgement, care and communication — so your examples of those traits often beat reciting statutes.</div>`},

   <ul>
   <li><strong>Situation</strong> — set the scene briefly.</li>
   <li><strong>Task</strong> — what you needed to achieve.</li>
   <li><strong>Action</strong> — what <em>you</em> specifically did.</li>
   <li><strong>Result</strong> — the outcome, ideally measurable, and what you learned.</li>
   </ul>
   <p>Prepare 4–6 stories you can flex across questions: a time you caught an error others missed, handled high volume under pressure, made a careful judgement call, dealt with a difficult person, and acted with integrity.</p>

/* ============================================================
   GAMIFICATION ENGINE
============================================================ */
function levelFromXp(xp){return Math.floor(xp/250)+1;}
function xpIntoLevel(xp){return xp%250;}
function addXp(n,reason){
  const before=levelFromXp(state.xp);
  state.xp+=n; saveState();
  toast(`+${n} XP`,reason||"",'⚡');
  const after=levelFromXp(state.xp);
  if(after>before) toast(`Level ${after}!`,"You levelled up","🎉");
  checkBadges(); hydrateStats();
}
function checkBadges(){
  BADGES.forEach(b=>{
    if(!state.badges.includes(b.id)&&b.test(state)){
      state.badges.push(b.id); saveState();
      toast("Badge unlocked!",b.name,b.em);
    }
  });
}
function touchStreak(){
  const today=new Date().toISOString().slice(0,10);
  if(state.lastDay===today) return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  state.streak = (state.lastDay===y)? state.streak+1 : 1;
  state.lastDay=today; saveState(); checkBadges();
}
function toast(title,sub,em){
  const w=document.getElementById('toasts');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span class="em">${em||'✅'}</span><div><b>${title}</b>${sub?`<div style="opacity:.8;font-size:.8rem">${sub}</div>`:''}</div>`;
  w.appendChild(t);

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function weekProgress(){return Math.round(state.doneWeeks.length/COURSE.length*100);}
function isDone(i){return state.doneWeeks.includes(i);}
function isUnlocked(i){return i===0||isDone(i-1)||isDone(i);}
function nextWeek(){for(let i=0;i<COURSE.length;i++){if(!isDone(i))return i;}return COURSE.length-1;}

      addXp(opt.good?20:8, opt.good?'Solved scenario':'Scenario attempted');
      checkBadges();
    });
  });
}

function renderFlashInto(el,cards){
  let idx=0; const total=cards.length;
  el.innerHTML=`<div class="fc-stage">
    <div class="flashcard" id="fc-card">
      <div class="fc-inner">
        <div class="fc-face fc-front"><div class="k">TERM</div><div class="term" id="fc-term"></div></div>
        <div class="fc-face fc-back"><div class="k">DEFINITION</div><div class="def" id="fc-def"></div></div>
      </div>
    </div>
    <div class="fc-hint">Tap the card to flip</div>
    <div class="fc-ctrl">
      <button class="btn ghost sm" id="fc-prev">← Prev</button>
      <span class="fc-count" id="fc-count"></span>
      <button class="btn ghost sm" id="fc-next">Next →</button>
    </div>
  </div>`;
  const card=el.querySelector('#fc-card');
  function paint(){
    card.classList.remove('flip');
    el.querySelector('#fc-term').textContent=cards[idx].t;
    el.querySelector('#fc-def').textContent=cards[idx].d;
    el.querySelector('#fc-count').textContent=`${idx+1} / ${total}`;
  }
  card.addEventListener('click',()=>{card.classList.toggle('flip');if(card.classList.contains('flip')){state.seenCards++;saveState();}});
  el.querySelector('#fc-prev').addEventListener('click',()=>{idx=(idx-1+total)%total;paint();});
  el.querySelector('#fc-next').addEventListener('click',()=>{idx=(idx+1)%total;paint();});
  paint();
}

function renderQuizInto(el,quiz,wkIndex){
  let answered={}, score=0;
  el.innerHTML=`<div class="card" style="padding:24px"><div id="q-body"></div>
    <div id="q-foot" style="margin-top:8px"></div></div>`;
  const body=el.querySelector('#q-body');
  body.innerHTML=quiz.map((q,qi)=>`
    <div class="quiz-q">
      <div class="qn">QUESTION ${qi+1} / ${quiz.length}</div>
      <h4>${esc(q.q)}</h4>
      ${q.o.map((opt,oi)=>`<button class="opt" data-q="${qi}" data-o="${oi}"><span class="ltr">${String.fromCharCode(65+oi)}</span><span>${esc(opt)}</span></button>`).join('')}
      <div class="explain" id="exp-${qi}"></div>
    </div>`).join('');
  body.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const qi=+btn.dataset.q, oi=+btn.dataset.o;
      if(answered[qi]!=null) return;
      answered[qi]=oi;
      const q=quiz[qi], correct=q.a;
      body.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(b=>{
        b.classList.add('locked');
        const bi=+b.dataset.o;
        if(bi===correct) b.classList.add('correct');
        if(bi===oi&&oi!==correct) b.classList.add('wrong');
      });
      if(oi===correct) score++;
      const exp=el.querySelector('#exp-'+qi);
      exp.className='explain show';
      exp.innerHTML=`<b>${oi===correct?'Correct.':'Not quite.'}</b> ${esc(q.e)}`;
      if(Object.keys(answered).length===quiz.length) finishQuiz();
    });
  });
  function finishQuiz(){
    const pct=Math.round(score/quiz.length*100);
    const prev=state.quizScores[wkIndex]||0;
    if(pct>prev){state.quizScores[wkIndex]=pct;saveState();}
    addXp(Math.round(pct/10)*2,'Quiz: '+pct+'%');
    checkBadges();
    const foot=el.querySelector('#q-foot');
    foot.innerHTML=`<div class="quiz-result"><div class="score">${pct}%</div>
      <p style="color:var(--ink-soft)">You scored ${score} of ${quiz.length}. ${pct>=80?'Excellent — solid grasp of this week.':pct>=50?'Good start — review the explanations and retry.':'Worth re-reading the lessons, then retry.'}</p>
      <button class="btn ghost sm" style="margin-top:10px" onclick="go('week',${wkIndex})">Retake / review week</button></div>`;
    foot.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

const TUTOR_QA=[
 {k:["three stage","stages of money","placement","layering","integration"],a:"The three stages of money laundering are: <b>Placement</b> (getting dirty money into the system, e.g. cash deposits), <b>Layering</b> (moving it through many transactions to hide the trail), and <b>Integration</b> (bringing the clean-looking money back into the legitimate economy). In fintech these can all happen within hours. See Week 2."},
 {k:["tipping off","333a","tip off"],a:"<b>Tipping off</b> (<span class='statute'>POCA s.333A</span>) is telling someone — usually the customer — that a SAR has been or will be made, where it could prejudice an investigation. It's a separate criminal offence. Use neutral language and never confirm a report exists. See Week 2."},
 {k:["pep","politically exposed"],a:"A <b>PEP</b> is a Politically Exposed Person — someone with a prominent public function, plus their family and close associates. It signals higher corruption risk, so it triggers <b>EDD</b>: senior approval, source of wealth/funds, enhanced monitoring. It is <i>not</i> an accusation, and domestic PEPs are generally lower risk and shouldn't be refused by reflex. See Week 7."},
 {k:["cdd","customer due","due diligence"],a:"<b>CDD</b> (Customer Due Diligence) has four parts: <b>identify</b> the customer, <b>verify</b> that identity with reliable independent sources, <b>understand</b> the purpose of the relationship, and <b>monitor</b> ongoing. Depth scales with risk — simplified (SDD) for low risk, enhanced (EDD) for higher risk. See Week 6."},
 {k:["edd","enhanced due"],a:"<b>EDD</b> is standard CDD plus extra measures for higher risk: more identity/ownership info, establishing source of funds and wealth, senior management approval, and intensified monitoring. It's mandatory under <span class='statute'>MLR reg 33</span> for PEPs, high-risk countries and complex/unusual cases. See Week 7."},
 {k:["sar","suspicious activity"],a:"A <b>SAR</b> (Suspicious Activity Report) goes to the <b>NCA's UK Financial Intelligence Unit</b> when a firm suspects ML/TF. An analyst raises an internal SAR to the <b>MLRO</b>, who decides whether to file externally. A good narrative covers who/what/why-suspicious/so-what. See Week 10."},
 {k:["daml","consent","moratorium","notice period"],a:"A <b>DAML</b> (Defence Against Money Laundering) is when a firm reports and asks the NCA's permission to proceed with a suspicious transaction. There's a <b>7-working-day notice period</b>; if not refused, the firm may proceed. If refused, a <b>31-calendar-day moratorium</b> begins for law enforcement to act. See Week 10."},
 {k:["sanction","ofsi","consolidated list","asset freeze"],a:"<b>Sanctions</b> are legal restrictions (often asset freezes) against countries, entities or designated persons. <b>OFSI</b> (part of HM Treasury) runs UK financial sanctions and publishes the consolidated list you screen against. Breaches are <b>strict liability</b> — 'I didn't know' is no defence. See Week 3."},
 {k:["poca","proceeds of crime","s.327","s.328","s.329","327","328"],a:"<b>POCA 2002</b> contains the main laundering offences: <span class='statute'>s.327</span> concealing, <span class='statute'>s.328</span> arrangements (the one that catches firms most), <span class='statute'>s.329</span> acquisition/use/possession, plus <span class='statute'>s.330</span> failure to disclose and <span class='statute'>s.333A</span> tipping off. The trigger is knowledge or suspicion — not proof. See Week 2."},
 {k:["terrorist financing","tf","terrorism act"],a:"<b>Terrorist financing</b> funds terrorism, and the money can be clean in origin — the concern is destination/purpose. Core offences are <span class='statute'>Terrorism Act 2000 ss.15–18</span>, with a regulated-sector disclosure duty in s.21A. Because origin doesn't help, screening matters a lot. See Week 3."},
 {k:["bribery","s.7","adequate procedures","corruption"],a:"The <b>Bribery Act 2010</b> covers offering (s.1), receiving (s.2) and bribing foreign officials (s.6), plus the corporate <b>'failure to prevent'</b> offence (s.7). The only defence to s.7 is having <b>adequate procedures</b>. The same 'failure to prevent' model applies to facilitating tax evasion. See Week 4."},
 {k:["risk based","risk assessment","reg 18","bwra","business wide"],a:"The <b>risk-based approach</b> is the spine of the MLRs: assess risk, then apply proportionate effort. Firms must do a documented <b>business-wide risk assessment</b> (<span class='statute'>reg 18</span>) across customer, product, geography, channel and transaction factors. Inherent risk → controls → residual risk → risk appetite. See Week 8."},
 {k:["monitoring","alert","red flag","transaction monitoring"],a:"<b>Transaction monitoring</b> screens activity (often automatically) and raises <b>alerts</b> for humans to work: triage → gather → analyse → decide → document. Common <b>red flags</b>: velocity/pass-through, structuring, third-party funding (mules), profile mismatch, high-risk geography. Red flags only mean something relative to the customer's expected profile. See Week 9."},
 {k:["three lines","defence","governance","mlro role"],a:"The <b>three lines of defence</b>: 1st line = the business running controls (incl. analysts); 2nd line = risk & compliance, incl. the <b>MLRO</b>, setting policy and challenging; 3rd line = internal audit giving independent assurance to the board. Independence between them is the point. See Week 11."},
 {k:["sm&cr","smcr","senior manager","accountab"],a:"<b>SM&CR</b> (Senior Managers & Certification Regime) creates personal accountability: senior managers have documented responsibilities and a Duty of Responsibility, key staff are certified as fit and proper, and Conduct Rules apply broadly. It's why higher-risk decisions need senior sign-off. See Week 11."},
 {k:["interview","job","cv","career","star"],a:"For interviews, employers test judgement, attention to detail, clear writing, risk thinking and integrity. Use the <b>STAR</b> method (Situation, Task, Action, Result) for behavioural questions, and never say you'd clear an alert you don't understand. Head to <b>Interview prep</b> for a full question bank and Week 12 for CV/career help."},
 {k:["beneficial owner","25%","psc","ownership"],a:"A <b>beneficial owner</b> is the natural person who ultimately owns or controls a customer — generally anyone with <b>more than 25%</b> of shares/voting rights or other control. UK companies record this as <b>PSCs</b> at Companies House. If you can't identify the ultimate owner, that's a red flag. See Week 6."},
 {k:["source of funds","source of wealth","sof","sow"],a:"<b>Source of Funds</b> = where the specific money in this account/transaction came from now (e.g. salary, property sale). <b>Source of Wealth</b> = how the customer built their overall wealth over time (e.g. business sale, inheritance). Evidence both with documents, not just a bank statement. See Week 7."}
];
const TUTOR_SUGGEST=["What are the three stages of laundering?","What is tipping off?","Explain CDD vs EDD","What is a SAR and DAML?","How are PEPs handled?","Interview tips"];
function tutorAnswer(qRaw){
  const q=qRaw.toLowerCase();
  // 1) keyword Q&A bank
  let best=null,bestHits=0;
  TUTOR_QA.forEach(item=>{const hits=item.k.filter(k=>q.includes(k)).length;if(hits>bestHits){bestHits=hits;best=item;}});
  if(best&&bestHits>0) return best.a;
  // 2) glossary fallback
  const g=GLOSSARY.find(g=>q.includes(g.t.toLowerCase()))||GLOSSARY.find(g=>g.t.toLowerCase().split(/[ /(]/).some(w=>w.length>3&&q.includes(w)));
  if(g) return `<b>${esc(g.t)}:</b> ${esc(g.d)} <br><br><span style="color:var(--ink-soft);font-size:.85rem">Tip: open the <b>Glossary</b> or use the search there for related terms.</span>`;
  // 3) graceful default
  return `I'm a built-in study tutor for this course, so I answer from the 12 weeks of material. I couldn't find an exact match for that. Try rephrasing, or ask about: money laundering stages, POCA offences, CDD/EDD, PEPs, sanctions/OFSI, SARs & DAML, risk assessment, transaction monitoring, the three lines of defence, or interview prep. You can also browse the <b>Glossary</b> and <b>Library</b>.`;
}
VIEWS.tutor=function(c){
  c.innerHTML=`<div class="eyebrow">Study help</div><h1 class="page-h">AI tutor</h1>
   <p class="lead">Ask about anything in the course and get a plain-English explanation drawn from the 12 weeks of material. Great for a quick refresher before a quiz or interview.</p>
   <div class="card" style="padding:20px;margin-top:18px">
     <div class="suggest" id="tutor-suggest">${TUTOR_SUGGEST.map(s=>`<button>${esc(s)}</button>`).join('')}</div>
     <div class="chat">
       <div class="chat-log" id="tutor-log">
         <div class="msg bot">Hi! I'm your study tutor 👋 Ask me to explain any concept — like "what is tipping off?" or "CDD vs EDD" — or tap a suggestion above.</div>
       </div>
       <div class="chat-in">
         <input id="tutor-input" placeholder="Ask a question…" autocomplete="off">
         <button class="btn primary" id="tutor-send">Send</button>
       </div>
     </div>
     <p style="font-size:.75rem;color:var(--ink-soft);margin-top:10px">Note: this tutor runs entirely on your device using the course content — it doesn't browse the internet, so always verify current rules on the FCA and legislation.gov.uk.</p>
   </div>`;
  const log=c.querySelector('#tutor-log'), input=c.querySelector('#tutor-input');
  function push(text,who){const m=document.createElement('div');m.className='msg '+who;m.innerHTML=text;log.appendChild(m);log.scrollTop=log.scrollHeight;}
  function ask(q){if(!q.trim())return;push(esc(q),'me');input.value='';setTimeout(()=>{push(tutorAnswer(q),'bot');addXp(2,'Asked the tutor');},250);}
  c.querySelector('#tutor-send').addEventListener('click',()=>ask(input.value));
  input.addEventListener('keydown',e=>{if(e.key==='Enter')ask(input.value);});
  c.querySelectorAll('#tutor-suggest button').forEach(b=>b.addEventListener('click',()=>ask(b.textContent)));
};
