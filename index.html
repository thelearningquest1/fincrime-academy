<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinCrime Academy — UK Financial Crime, learned by doing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1B2A;          /* deep navy — primary text & dark surfaces */
  --ink-2:#1B3A5B;        /* mid navy */
  --ink-soft:#46586b;     /* muted text */
  --line:#dfe4ec;         /* hairlines */
  --bg:#EBEEF4;           /* cool paper app bg */
  --surface:#ffffff;      /* cards */
  --surface-2:#f6f8fb;    /* inset panels */
  --paper:#F8F4E9;        /* reading/case-file surface */
  --gold:#E0A526;         /* XP / follow-the-money */
  --gold-soft:#fbeecb;
  --indigo:#2D4EF5;       /* primary action */
  --indigo-soft:#e6ebff;
  --teal:#0FA47F;         /* verified / correct / safe */
  --teal-soft:#dcf3ec;
  --red:#D7263D;          /* RISK / red flags only */
  --red-soft:#fbe2e5;
  --shadow:0 1px 2px rgba(14,27,42,.06),0 8px 24px rgba(14,27,42,.07);
  --shadow-lg:0 24px 60px rgba(14,27,42,.18);
  --r:16px; --r-sm:10px; --r-lg:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  line-height:1.6; -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,h4,.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em;line-height:1.15}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::selection{background:var(--gold-soft)}

/* ---------- LAYOUT ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;flex:0 0 248px;background:var(--ink);color:#cdd6e2;
  padding:22px 16px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;z-index:50;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--gold),#c8881a);display:grid;place-items:center;flex:0 0 38px;box-shadow:0 6px 18px rgba(224,165,38,.35)}
.brand .mark svg{width:22px;height:22px}
.brand .name{font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:1.05rem;line-height:1.1}
.brand .name small{display:block;font-family:'JetBrains Mono';font-weight:400;font-size:.6rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-top:3px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:#aab7c6;font-weight:500;font-size:.92rem;text-align:left;width:100%;transition:.15s}
.nav-item svg{width:19px;height:19px;flex:0 0 19px;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--indigo);color:#fff}
.nav-item.active svg{opacity:1}
.nav-spacer{flex:1}
.streak-chip{margin-top:auto;background:rgba(224,165,38,.12);border:1px solid rgba(224,165,38,.3);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.streak-chip .fire{font-size:1.4rem}
.streak-chip b{color:#fff;font-family:'Space Grotesk';display:block;font-size:1.05rem}
.streak-chip span{font-size:.72rem;color:#9fb0c0}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;
  padding:0 28px;gap:18px;position:sticky;top:0;z-index:40;
}
.topbar .crumb{font-family:'JetBrains Mono';font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
.topbar .grow{flex:1}
.stat-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);padding:7px 13px;border-radius:30px;font-weight:600;font-size:.85rem;box-shadow:var(--shadow)}
.stat-pill.xp{color:var(--gold)} .stat-pill.lvl{color:var(--indigo)}
.stat-pill svg{width:16px;height:16px}
.content{padding:30px 36px 80px;max-width:1080px;width:100%;margin:0 auto;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- TYPE / GENERAL ---------- */
.eyebrow{font-family:'JetBrains Mono';font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo);font-weight:500}
.page-h{font-size:2rem;margin:6px 0 4px}
.lead{color:var(--ink-soft);font-size:1.02rem;max-width:62ch}
.section-h{font-size:1.25rem;margin:34px 0 14px;display:flex;align-items:center;gap:10px}
.section-h .n{font-family:'JetBrains Mono';font-size:.8rem;color:var(--gold);background:var(--gold-soft);padding:3px 8px;border-radius:6px}

/* ---------- CARDS ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:880px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* tags / stamps */
.tag{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono';font-size:.68rem;letter-spacing:.05em;padding:4px 9px;border-radius:6px;font-weight:500;text-transform:uppercase}
.tag.law{background:var(--ink);color:#cfe0ff}
.tag.fca{background:var(--indigo-soft);color:var(--indigo)}
.tag.risk{background:var(--red-soft);color:var(--red)}
.tag.ok{background:var(--teal-soft);color:var(--teal)}
.tag.gold{background:var(--gold-soft);color:#a9760d}
.stamp{font-family:'JetBrains Mono';font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:2px solid var(--red);color:var(--red);padding:3px 10px;border-radius:6px;font-size:.72rem;transform:rotate(-3deg);display:inline-block}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;font-weight:600;font-size:.92rem;transition:.15s;border:1px solid transparent}
.btn.primary{background:var(--indigo);color:#fff;box-shadow:0 6px 16px rgba(45,78,245,.28)}
.btn.primary:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(45,78,245,.34)}
.btn.gold{background:var(--gold);color:#3a2a05;box-shadow:0 6px 16px rgba(224,165,38,.3)}
.btn.gold:hover{transform:translateY(-1px)}
.btn.ghost{background:var(--surface);border-color:var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--ink-soft)}
.btn.sm{padding:8px 14px;font-size:.85rem}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

/* progress ring */
.ring-wrap{position:relative;width:132px;height:132px;flex:0 0 132px}
.ring-wrap .lbl{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.ring-wrap .lbl b{font-family:'Space Grotesk';font-size:1.9rem;display:block;line-height:1}
.ring-wrap .lbl span{font-size:.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.1em}
.bar{height:9px;background:var(--surface-2);border-radius:30px;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#f2c558);border-radius:30px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

/* ---------- LEARNING PATH ---------- */
.path{position:relative;padding:20px 0 40px}
.path .spine{position:absolute;left:50%;top:0;bottom:0;width:4px;background:repeating-linear-gradient(var(--line) 0 10px,transparent 10px 20px);transform:translateX(-50%)}
.node-row{position:relative;display:flex;justify-content:center;margin:6px 0;z-index:2}
.node-row:nth-child(even){transform:translateX(86px)}
.node-row:nth-child(odd){transform:translateX(-86px)}
.node{width:184px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--shadow);cursor:pointer;transition:.18s;text-align:left;position:relative}
.node:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--indigo)}
.node .wk{font-family:'JetBrains Mono';font-size:.65rem;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase}
.node h4{font-size:.96rem;margin:5px 0 9px}
.node .meta{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--ink-soft)}
.node .disc{position:absolute;top:-13px;left:15px;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:.85rem;color:#fff;background:var(--ink-2);box-shadow:0 4px 10px rgba(0,0,0,.18)}
.node.done .disc{background:var(--teal)} .node.active .disc{background:var(--gold);color:#3a2a05;animation:pulse 2s infinite}
.node.locked{opacity:.55;filter:saturate(.4)}
.node.locked .disc{background:var(--ink-soft)}
.node .ck{position:absolute;top:13px;right:13px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,165,38,.5)}50%{box-shadow:0 0 0 9px rgba(224,165,38,0)}}
@media(max-width:880px){.node-row,.node-row:nth-child(even),.node-row:nth-child(odd){transform:none;justify-content:flex-start;padding-left:34px}.path .spine{left:17px}}

/* ---------- LESSON / READING ---------- */
.reader{background:var(--paper);border:1px solid #e8ddc2;border-radius:var(--r);padding:30px 34px;position:relative;box-shadow:var(--shadow)}
.reader::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--gold);border-radius:5px 0 0 5px}
.reader h3{font-size:1.4rem;margin:0 0 6px}
.reader h4{font-size:1.05rem;margin:22px 0 8px;color:var(--ink-2)}
.reader p{margin:11px 0;color:#2c3a48}
.reader ul,.reader ol{margin:11px 0 11px 22px;color:#2c3a48}
.reader li{margin:6px 0}
.reader strong{color:var(--ink)}
.reader .why{background:#fff;border-left:3px solid var(--indigo);border-radius:0 10px 10px 0;padding:13px 16px;margin:16px 0}
.reader .why b{font-family:'JetBrains Mono';font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--indigo);display:block;margin-bottom:4px}
.statute{font-family:'JetBrains Mono';background:var(--ink);color:#cfe0ff;padding:1px 7px;border-radius:5px;font-size:.82em;white-space:nowrap}

/* objective list */
.obj{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px dashed var(--line)}
.obj:last-child{border:none}
.obj .o-ico{width:26px;height:26px;border-radius:8px;background:var(--indigo-soft);color:var(--indigo);display:grid;place-items:center;flex:0 0 26px;font-weight:700;font-family:'Space Grotesk';font-size:.8rem}

/* day accordion */
.day{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--surface)}
.day-head{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;transition:.15s}
.day-head:hover{background:var(--surface-2)}
.day-num{width:42px;height:42px;border-radius:11px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;flex:0 0 42px;line-height:1;text-align:center}
.day-num small{display:block;font-size:.52rem;letter-spacing:.1em;opacity:.7;font-family:'JetBrains Mono'}
.day-head h4{font-size:1rem} .day-head .sub{font-size:.78rem;color:var(--ink-soft)}
.day-head .chev{margin-left:auto;transition:.2s;color:var(--ink-soft)}
.day.open .chev{transform:rotate(90deg)}
.day-body{display:none;padding:0 18px 20px 74px}
.day.open .day-body{display:block;animation:fade .3s}
.task{display:flex;gap:10px;align-items:flex-start;padding:9px 0;font-size:.92rem;color:#33414f}
.task .b{width:7px;height:7px;border-radius:50%;background:var(--gold);margin-top:9px;flex:0 0 7px}

/* exercise / activity box */
.exbox{border:1px solid var(--line);border-radius:14px;padding:20px 22px;background:var(--surface)}
.exbox .hd{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.exbox h4{font-size:1.05rem}
.steps{counter-reset:s;margin:14px 0}
.steps li{list-style:none;position:relative;padding:9px 0 9px 38px;border-bottom:1px solid var(--line);font-size:.92rem}
.steps li:last-child{border:none}
.steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:9px;width:24px;height:24px;border-radius:7px;background:var(--indigo);color:#fff;display:grid;place-items:center;font-size:.75rem;font-weight:700;font-family:'Space Grotesk'}
.find-q{background:var(--surface-2);border-radius:10px;padding:12px 15px;margin-top:8px;font-size:.9rem}
.find-q b{color:var(--indigo)}
.linkout{color:var(--indigo);font-weight:600;text-decoration:none;border-bottom:1.5px solid var(--indigo-soft)}
.linkout:hover{border-color:var(--indigo)}

/* ---------- FLASHCARDS ---------- */
.fc-stage{display:grid;place-items:center;padding:10px 0 22px}
.flashcard{width:100%;max-width:560px;height:300px;perspective:1600px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flashcard.flip .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;padding:34px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow-lg)}
.fc-front{background:var(--ink);color:#fff}
.fc-back{background:var(--paper);color:var(--ink);transform:rotateY(180deg);border:1px solid #e8ddc2;overflow:auto}
.fc-face .k{font-family:'JetBrains Mono';font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-bottom:14px}
.fc-front .term{font-family:'Space Grotesk';font-size:1.7rem;font-weight:600}
.fc-back .def{font-size:1.02rem;line-height:1.55}
.fc-hint{text-align:center;color:var(--ink-soft);font-size:.82rem;margin-top:10px}
.fc-ctrl{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px}
.fc-count{font-family:'JetBrains Mono';font-size:.85rem;color:var(--ink-soft)}

/* ---------- QUIZ ---------- */
.quiz-q{margin-bottom:18px}
.quiz-q .qn{font-family:'JetBrains Mono';font-size:.72rem;color:var(--gold);letter-spacing:.1em}
.quiz-q h4{font-size:1.12rem;margin:6px 0 14px;font-family:'Inter';font-weight:600;line-height:1.4}
.opt{display:block;width:100%;text-align:left;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;background:var(--surface);font-size:.94rem;transition:.12s;display:flex;gap:12px;align-items:center}
.opt:hover:not(.locked){border-color:var(--indigo);background:var(--indigo-soft)}
.opt .ltr{width:26px;height:26px;border-radius:7px;background:var(--surface-2);display:grid;place-items:center;font-weight:700;font-size:.8rem;flex:0 0 26px;font-family:'Space Grotesk'}
.opt.correct{border-color:var(--teal);background:var(--teal-soft)} .opt.correct .ltr{background:var(--teal);color:#fff}
.opt.wrong{border-color:var(--red);background:var(--red-soft)} .opt.wrong .ltr{background:var(--red);color:#fff}
.opt.locked{cursor:default}
.explain{background:var(--surface-2);border-left:3px solid var(--teal);border-radius:0 10px 10px 0;padding:12px 15px;margin:4px 0 18px;font-size:.9rem;display:none}
.explain.show{display:block;animation:fade .3s}
.explain b{color:var(--teal)}
.quiz-result{text-align:center;padding:30px}
.quiz-result .score{font-family:'Space Grotesk';font-size:3.4rem;color:var(--indigo)}

/* ---------- SCENARIO ---------- */
.scn-card{background:var(--ink);color:#dbe4ef;border-radius:var(--r-lg);padding:26px 28px;box-shadow:var(--shadow-lg)}
.scn-card .file-tab{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#3a2a05;font-family:'JetBrains Mono';font-size:.7rem;letter-spacing:.1em;padding:5px 12px;border-radius:7px;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.scn-card h3{color:#fff;font-size:1.3rem}
.scn-card .brief{color:#aebccd;margin:10px 0 18px;font-size:.96rem}
.scn-data{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;margin:14px 0;font-family:'JetBrains Mono';font-size:.82rem}
.scn-data .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed rgba(255,255,255,.08)}
.scn-data .row:last-child{border:none}
.scn-data .row span:first-child{color:#7e90a4}
.scn-opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:#e6edf5;padding:14px 16px;border-radius:12px;margin-bottom:10px;transition:.14s;font-size:.92rem}
.scn-opt:hover:not(.done){background:rgba(45,78,245,.25);border-color:var(--indigo)}
.scn-opt.good{background:rgba(15,164,127,.22);border-color:var(--teal)}
.scn-opt.bad{background:rgba(215,38,61,.2);border-color:var(--red)}
.scn-fb{margin-top:14px;padding:14px 16px;border-radius:12px;font-size:.92rem;display:none}
.scn-fb.show{display:block;animation:fade .3s}
.scn-fb.good{background:rgba(15,164,127,.15);border:1px solid var(--teal)}
.scn-fb.bad{background:rgba(215,38,61,.13);border:1px solid var(--red)}

/* ---------- LIBRARY / TABLES ---------- */
.reg-row{display:flex;gap:16px;align-items:flex-start;padding:18px;border-bottom:1px solid var(--line)}
.reg-row:last-child{border:none}
.reg-row .yr{font-family:'Space Grotesk';font-weight:700;font-size:1.5rem;color:var(--gold);flex:0 0 64px;line-height:1}
.reg-row h4{font-size:1.02rem;margin-bottom:3px}
.reg-row p{font-size:.88rem;color:var(--ink-soft)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

/* glossary */
.gloss-search{width:100%;padding:14px 18px;border:1.5px solid var(--line);border-radius:14px;font-size:1rem;font-family:inherit;background:var(--surface)}
.gloss-search:focus{outline:none;border-color:var(--indigo)}
.gterm{padding:16px 0;border-bottom:1px solid var(--line)}
.gterm dt{font-family:'Space Grotesk';font-weight:600;font-size:1.05rem;color:var(--ink-2);display:flex;align-items:center;gap:8px}
.gterm dd{color:var(--ink-soft);font-size:.92rem;margin-top:4px}

/* tutor */
.chat{display:flex;flex-direction:column;height:62vh;min-height:440px}
.chat-log{flex:1;overflow:auto;padding:8px 4px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:80%;padding:13px 16px;border-radius:16px;font-size:.94rem;line-height:1.5}
.msg.bot{background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:4px;align-self:flex-start}
.msg.me{background:var(--indigo);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.msg.bot .statute{font-size:.78em}
.chat-in{display:flex;gap:10px;margin-top:14px}
.chat-in input{flex:1;padding:13px 16px;border:1.5px solid var(--line);border-radius:14px;font-family:inherit;font-size:.95rem}
.chat-in input:focus{outline:none;border-color:var(--indigo)}
.suggest{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.suggest button{font-size:.8rem;padding:7px 12px;border:1px solid var(--line);border-radius:20px;background:var(--surface);color:var(--ink-2);transition:.14s}
.suggest button:hover{border-color:var(--indigo);color:var(--indigo)}

/* badges */
.badge{text-align:center;padding:18px 12px;border-radius:16px;border:1px solid var(--line);background:var(--surface);transition:.18s}
.badge.locked{opacity:.4;filter:grayscale(1)}
.badge .em{font-size:2.4rem;display:block;margin-bottom:7px}
.badge h5{font-size:.86rem;font-family:'Space Grotesk'} .badge p{font-size:.72rem;color:var(--ink-soft);margin-top:3px}

/* toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:14px 18px;border-radius:14px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:12px;font-size:.9rem;font-weight:500;animation:slidein .3s;max-width:330px}
.toast .em{font-size:1.5rem}
@keyframes slidein{from{transform:translateX(120%)}to{transform:none}}

/* mobile nav */
.mnav{display:none}
@media(max-width:880px){
  .sidebar{display:none}
  .content{padding:22px 18px 96px}
  .topbar{padding:0 18px}
  .mnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--ink);z-index:60;padding:8px 4px;justify-content:space-around;border-top:1px solid rgba(255,255,255,.1)}
  .mnav button{color:#9fb0c0;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.6rem;padding:5px 7px;border-radius:9px}
  .mnav button svg{width:21px;height:21px}

 reading:[
  {h:"What is financial crime?",b:`<p><strong>Financial crime</strong> is any crime that lets a person make, move, hide, or keep money they are not entitled to — or that uses the financial system to fund harm. It is not one offence; it is a family of them.</p>
   <p>The main members of the family you will meet again and again:</p>
   <ul>
   <li><strong>Money laundering</strong> — making the proceeds of crime look clean and legitimate.</li>
   <li><strong>Terrorist financing</strong> — raising or moving money to fund terrorism (the money can even be <em>clean</em> to start with — that's the key twist).</li>
   <li><strong>Fraud</strong> — dishonestly deceiving someone to make a gain or cause a loss.</li>
   <li><strong>Bribery & corruption</strong> — paying or accepting something to improperly influence a decision.</li>
   <li><strong>Sanctions evasion</strong> — doing business with people, firms or countries the UK has legally banned.</li>
   <li><strong>Tax evasion</strong> — illegally not paying tax that is due.</li>
   <li><strong>Modern slavery & human trafficking</strong> — exploiting people for profit; the money trail is how we catch it.</li>
   <li><strong>Proliferation financing</strong> — funding the spread of weapons of mass destruction.</li>
   </ul>
   <div class="why"><b>Why it exists as a job</b>Criminals can't enjoy their money while it looks dirty. The financial system is the bottleneck they must pass through — so banks, payment firms and crypto exchanges are made the gatekeepers. Your future job is to guard that gate.</div>`},
  {h:"Who polices the money? (UK bodies)",b:`<p>You only need four names to start:</p>
   <ul>
   <li><strong>FCA — Financial Conduct Authority.</strong> The conduct regulator for ~50,000 firms. It authorises fintechs, writes rules (the <em>FCA Handbook</em>), supervises firms and takes enforcement action. <span class="statute">created by FSMA 2000</span></li>
   <li><strong>NCA — National Crime Agency.</strong> The UK's "FBI". It runs the <strong>UK Financial Intelligence Unit (UKFIU)</strong>, which receives every <strong>Suspicious Activity Report (SAR)</strong> firms submit.</li>
   <li><strong>HM Treasury (HMT).</strong> The government department responsible for the Money Laundering Regulations and overall financial-crime policy.</li>
   <li><strong>OFSI — Office of Financial Sanctions Implementation.</strong> Part of HMT. It runs the UK sanctions regime and publishes the consolidated list of designated persons.</li>
   </ul>
   <div class="why"><b>Why this matters day one</b>In a fintech role you will <em>screen</em> customers against OFSI's list, <em>file SARs</em> to the NCA, and be <em>supervised</em> by the FCA. Knowing who's who stops you sounding lost in an interview.</div>`},
  {h:"Why your fintech is legally obliged to care",b:`<p>A fintech doesn't fight crime out of goodwill — it is <strong>legally required</strong> to. If it carries out activities like payments, e-money, lending or crypto exchange, it falls into the <strong>"regulated sector"</strong> under the Money Laundering Regulations.</p>
   <p>That status brings duties: know your customers, monitor their transactions, report suspicion, keep records, and appoint a senior person (the <strong>MLRO</strong> — Money Laundering Reporting Officer) accountable for it all.</p>
   <p>Get it wrong and the consequences are real: multi-million-pound fines, public censure, restrictions on the business, and — for individuals under the <span class="statute">SM&CR</span> — personal bans. People can go to prison.</p>
   <div class="why"><b>The fintech twist</b>Fintechs are fast, online, cross-border and onboard customers in minutes. That convenience is exactly what criminals love. So regulators watch fast-growing fintechs especially closely.</div>`},
  {h:"Dirty money needs a crime first",b:`<p>This is the single most important idea in week 1. Money laundering is a <strong>secondary</strong> crime. Before money can be "laundered", it must already be the proceeds of some <strong>other</strong> crime — called the <strong>predicate offence</strong>.</p>
   <p>Examples of predicate offences: drug trafficking, fraud, theft, tax evasion, bribery, modern slavery. The cash they generate is "criminal property". Laundering is what the criminal does <em>next</em> to enjoy it safely.</p>
   <p>In UK law the proceeds are caught very broadly: under <span class="statute">POCA 2002</span>, criminal property is property that someone knows or suspects represents the benefit of criminal conduct.</p>
   <div class="why"><b>Why you'll be tested on this</b>Junior analysts constantly ask: "what's the underlying crime here?" If you can't imagine a predicate offence behind a suspicious pattern, you can't write a good SAR.</div>`}
 ],

 reading:[
  {h:"Placement, layering, integration",b:`<p>The textbook model of laundering has three stages. Real cases blur them, but they're a brilliant mental checklist.</p>
   <p><strong>1. Placement</strong> — getting the dirty money <em>into</em> the financial system. This is the riskiest moment for the criminal because cash is conspicuous. Example: depositing drug cash in many small amounts ("structuring" / "smurfing") to stay under reporting thresholds.</p>
   <p><strong>2. Layering</strong> — moving the money through lots of transactions to break the audit trail. Example: rapid transfers between accounts, currency conversions, buying and selling crypto, or routing funds through shell companies in several countries.</p>
   <p><strong>3. Integration</strong> — bringing the now "clean-looking" money back into the legitimate economy. Example: buying property, paying salaries from a front company, or investing in a business.</p>
   <div class="why"><b>Why fintech changes the picture</b>In a neobank or EMI, placement can be a card top-up, layering can be dozens of instant peer-to-peer transfers in minutes, and integration can be an outbound payment to a 'merchant'. Speed compresses all three stages into hours.</div>`},
  {h:"The offences that put people in prison (POCA Part 7)",b:`<p>The Proceeds of Crime Act 2002 contains the principal laundering offences. You should be able to name the big three:</p>
   <ul>
   <li><span class="statute">s.327</span> <strong>Concealing</strong> — concealing, disguising, converting, transferring or removing criminal property from the UK.</li>
   <li><span class="statute">s.328</span> <strong>Arrangements</strong> — entering into or becoming concerned in an arrangement you know or suspect facilitates another person's acquisition, retention, use or control of criminal property. <em>This is the one that catches firms and staff most often.</em></li>
   <li><span class="statute">s.329</span> <strong>Acquisition, use & possession</strong> — acquiring, using or possessing criminal property.</li>
   </ul>
   <p>Crucially, the mental state required is <strong>knowledge OR suspicion</strong>. You don't have to be certain. "Suspicion" is a low bar — a vague feeling that something isn't right, based on facts.</p>
   <div class="why"><b>Why s.328 is your daily reality</b>Processing a customer's payment when you suspect it involves criminal property could make the firm 'concerned in an arrangement'. The legal protection is to stop and report (seek consent / a DAML) rather than just push it through.</div>`},
  {h:"Failure to disclose & tipping off",b:`<p>Because firms are gatekeepers, POCA puts <strong>positive duties</strong> on people in the regulated sector:</p>
   <ul>
   <li><span class="statute">s.330</span> <strong>Failure to disclose</strong> — if you know, suspect, or have <em>reasonable grounds</em> to suspect laundering and you <em>don't</em> report it internally, that itself is an offence. The test is partly objective: 'should you have suspected?'</li>
   <li><span class="statute">s.333A</span> <strong>Tipping off</strong> — telling the customer (or anyone) that a SAR has been or will be made, in a way that could prejudice an investigation, is a separate criminal offence.</li>
   </ul>
   <p>So the operational rhythm is: spot it → report it internally to the MLRO → say nothing to the customer → let the MLRO decide whether to file a SAR with the NCA.</p>
   <div class="why"><b>Why tipping off feels counter-intuitive</b>New analysts want to 'help' the customer by explaining a delay. But warning them could let them move the money or destroy evidence. The safest line is a neutral, non-committal response — never confirm a report exists.</div>`}

  steps:["Open legislation.gov.uk and go to the Proceeds of Crime Act 2002","Use the Contents to jump to Part 7","Open sections 327, 328 and 329 in turn","Notice the structure: each section has subsections (1), (2)… defining the offence and defences","Find the section dealing with 'failure to disclose: regulated sector' (s.330)"],

 caseStudy:{firm:"Money-mule network through a payments app",type:"Payment Institution",
  body:`A payments app was used by an organised fraud gang. The gang recruited 'money mules' — often students and recently-arrived migrants — via social media adverts promising easy cash for 'receiving and forwarding payments'.<br><br>Victims of investment scams transferred money into mule accounts. Within minutes the funds were split and forwarded across multiple accounts (layering), then withdrawn or converted to crypto (integration).<br><br>The app's monitoring eventually flagged the hallmark mule pattern: brand-new accounts, sudden inbound from unrelated third parties, near-immediate outbound, accounts with no normal 'life' to them. A wave of SARs followed and accounts were frozen.`,
  lessons:["Mule accounts are the engine of layering in fintech fraud.","Hallmarks: new account, third-party inbound, rapid outbound, no genuine activity.","The mule may be a victim too — but the account is still moving criminal property.","Good monitoring looks at behaviour patterns, not just transaction size."]},
 scenario:{title:"Which laundering stage is this?",tab:"CASE FILE · W2-S1",
  brief:"Three things happen on one account in a single afternoon. Identify the laundering stage that best fits the overall pattern.",
  data:[["14:02","£9,500 cash loaded via 8 retail top-ups"],["14:40","Funds split into 6 transfers to other app users"],["15:15","Recipients convert balances to crypto, send to external wallet"]],
  options:[
   {t:"Only placement",good:false,fb:"The cash top-ups are placement, yes — but the splitting/transfers (layering) and the crypto conversion + external send (integration) are also present. Naming only placement misses two-thirds of the picture."},
   {t:"All three stages compressed into one afternoon",good:true,fb:"Exactly. Cash in = placement; splitting across users = layering; converting to crypto and sending out = integration. This compression of all three stages into hours is the signature of fintech laundering, and why real-time monitoring matters."},
   {t:"Integration only",good:false,fb:"Integration is the final re-entry of clean-looking funds. Here you can see the dirty cash entering (placement) and being moved (layering) first — so 'integration only' is incomplete."}
  ]},
 flashcards:[
  {t:"Placement",d:"Stage 1: getting dirty money into the financial system (e.g. cash deposits, card top-ups). The riskiest stage for the criminal."},
  {t:"Layering",d:"Stage 2: moving funds through many transactions to obscure the audit trail (transfers, conversions, shell companies)."},
  {t:"Integration",d:"Stage 3: returning 'clean-looking' funds to the legitimate economy (property, business investment, salaries)."},
  {t:"POCA s.327",d:"Concealing offence: concealing, disguising, converting, transferring or removing criminal property."},
  {t:"POCA s.328",d:"Arrangements offence: being concerned in an arrangement that facilitates another's use/control of criminal property. Catches firms most."},
  {t:"POCA s.329",d:"Acquisition, use and possession of criminal property."},
  {t:"POCA s.330",d:"Failure to disclose (regulated sector): an offence not to report where you know, suspect, or have reasonable grounds to suspect ML."},
  {t:"Tipping off (s.333A)",d:"Telling someone a SAR has/will be made in a way that may prejudice an investigation — a separate criminal offence."},
  {t:"Structuring / smurfing",d:"Breaking a large sum into many smaller transactions to avoid detection or thresholds."},
  {t:"Money mule",d:"A person (often recruited online) whose account is used to receive and forward criminal funds — may be a victim or complicit."}
 ],
 quiz:[
  {q:"A criminal deposits drug cash in 30 small amounts across many branches. Which stage is this?",o:["Layering","Integration","Placement","Reporting"],a:2,e:"Getting cash into the system is placement. Splitting into small amounts is 'structuring', a placement technique."},
  {q:"Which POCA offence most often catches firms processing a suspicious payment?",o:["s.327 concealing","s.328 arrangements","s.329 possession","s.333A tipping off"],a:1,e:"s.328 — being 'concerned in an arrangement' that facilitates use of criminal property — is the everyday risk for firms moving customer funds."},
  {q:"What mental state triggers the POCA reporting duty in the regulated sector?",o:["Absolute certainty of a crime","Knowledge, suspicion, or reasonable grounds to suspect","A court conviction","Only written proof"],a:1,e:"s.330 uses knowledge/suspicion and an objective 'reasonable grounds' test. Suspicion is a low, fact-based bar — not proof."},
  {q:"An analyst phones a customer to say 'your payment is delayed because we've reported you.' This risks committing…",o:["No offence — good service","Tipping off (s.333A)","Fraud","A data breach only"],a:1,e:"Revealing that a SAR exists can prejudice an investigation — that's the tipping-off offence. Use neutral language and never confirm a report."},
  {q:"Hallmarks of a money-mule account include all EXCEPT:",o:["Brand-new account","Inbound from unrelated third parties","Rapid outbound transfers","A long, consistent salary history"],a:3,e:"A genuine long salary history is the opposite of a mule profile. Mules show new accounts, third-party inbound and fast outbound with no real 'life'."},
  {q:"After spotting suspicion, the correct first step for an analyst is to…",o:["Tell the customer to explain","Report internally to the MLRO","File directly with the FCA","Close the account silently"],a:1,e:"Internal report to the MLRO comes first; the MLRO decides on a SAR to the NCA. Don't tip off the customer and don't self-file to the regulator."}
 ],
 reflection:"Take one transaction pattern you can imagine on a payments app and walk it through placement → layering → integration. Then explain why an analyst reports to the MLRO rather than telling the customer.",
 interview:[
  {q:"Walk me through the three stages of money laundering.",a:"Placement is getting dirty money into the system — say, cash deposits or card top-ups. Layering is moving it around to hide the trail — transfers, currency or crypto conversions, shell companies. Integration is bringing the clean-looking money back into the legitimate economy — property, business investment, salaries. In fintech these can all happen within hours."},
  {q:"What is tipping off and why does it matter?",a:"It's the offence under POCA s.333A of telling someone — usually the customer — that a SAR has been or will be made, where that could prejudice an investigation. It matters because warning a customer lets them move funds or destroy evidence. So we use neutral language, never confirm a report, and let the MLRO manage it."},
  {q:"You suspect a transaction involves criminal property. What do you do?",a:"I don't process it on autopilot or confront the customer. I document my reasoning and raise an internal SAR to the MLRO. The MLRO decides whether to submit a SAR to the NCA and whether to seek a defence/DAML before any transaction proceeds. I avoid tipping off throughout."}
 ]
},

 ],
 days:[
  {t:"Day 1 — Funding harm",sub:"Reading + activity",tasks:["Read lesson: 'Terrorist financing — clean money, dirty purpose'","Activity: list 3 ways legitimate funds could be diverted to TF","Watch YouTube: 'How is terrorism financed?'"]},

 ],
 reading:[
  {h:"Terrorist financing — clean money, dirty purpose",b:`<p>Money laundering is about <em>where money came from</em>. Terrorist financing (TF) is about <em>where it's going and what it will do</em>. The funds can be entirely legitimate — a salary, a benefit payment, a charity donation, a small business's takings — diverted to support terrorism.</p>
   <p>That's what makes TF so hard to detect: there's often no 'dirty origin' to find. Amounts can be tiny, and individual transactions look ordinary. Detection relies on context, networks, and intelligence rather than transaction size.</p>
   <div class="why"><b>Why this matters for screening</b>Because origin is no help, sanctions and watchlist screening — matching customers and counterparties against lists of designated terrorists and organisations — becomes a primary defence.</div>`},
  {h:"Terrorism Act 2000 essentials",b:`<p>The principal UK TF offences live in the Terrorism Act 2000:</p>
   <ul>
   <li><span class="statute">s.15</span> fund-raising for terrorism</li>
   <li><span class="statute">s.16</span> use & possession of money for terrorism</li>
   <li><span class="statute">s.17</span> funding arrangements</li>
   <li><span class="statute">s.18</span> money laundering (of terrorist property)</li>
   <li><span class="statute">s.21A</span> failure to disclose in the regulated sector — the TF equivalent of POCA s.330</li>
   </ul>
   <p>As with POCA, the regulated sector has a positive duty to report suspicion of TF. The same SAR route to the NCA applies.</p>
   <div class="why"><b>Two regimes, one habit</b>You don't have to decide whether something is ML or TF before reporting. If you suspect either, you raise it. The MLRO and the authorities work out which regime applies.</div>`},
  {h:"What sanctions are and why they bite",b:`<p><strong>Sanctions</strong> are legal restrictions imposed by governments to achieve foreign-policy or security goals — against countries, regimes, organisations or named individuals ("designated persons"). The most common type you'll meet is an <strong>asset freeze</strong>: you must not make funds or economic resources available to a designated person.</p>
   <p>In the UK, the framework comes from <span class="statute">SAMLA 2018</span> (the Sanctions and Anti-Money Laundering Act). HM Treasury's <strong>OFSI</strong> administers financial sanctions and publishes the <strong>consolidated list</strong> of designated persons. Breaches can be criminal — and importantly, financial-sanctions breaches are <strong>strict liability</strong> for civil penalties: you can be penalised even without intending to breach.</p>
   <div class="why"><b>Why 'strict liability' should scare you</b>"I didn't know they were sanctioned" is not a defence to a civil penalty. That's why firms screen <em>everyone</em>, at onboarding and continuously, and re-screen when the list changes.</div>`}
 ],

  steps:["Open legislation.gov.uk and find the Terrorism Act 2000","Use the Contents to reach Part III (Terrorist Property)","Open sections 15, 16, 17 and 18 in turn","Then find s.21A (failure to disclose: regulated sector)","Compare s.21A with POCA s.330"],

 caseStudy:{firm:"Crypto exchange and a sanctions near-miss",type:"Crypto exchange",
  body:`A UK crypto exchange onboarded a customer whose name closely matched an entry on the OFSI consolidated list. The automated screening tool raised an alert. A junior analyst, under pressure to clear a backlog, saw the date of birth didn't match and quickly dismissed it as a false positive.<br><br>Days later the customer attempted a large outbound transfer to a wallet linked to a sanctioned entity. Re-investigation showed the original 'false positive' was actually the designated person using a slightly different DOB. The exchange had nearly made funds available to a sanctioned party — a strict-liability breach.<br><br>The firm self-reported to OFSI, froze the assets, and overhauled its alert-handling procedures, including mandatory second-review for any name match against the sanctions list.`,
  lessons:["Sanctions screening alerts must be cleared carefully — speed pressure causes breaches.","A single mismatched field (like DOB) does not automatically mean false positive.","Name + alias + other identifiers should be assessed together.","Self-reporting to OFSI and freezing is the right response to a suspected breach."]},
 scenario:{title:"True match or false positive?",tab:"CASE FILE · W3-S1",
  brief:"Your screening tool fires an alert on a new customer. Decide how to handle it.",
  data:[["Customer name","Ivan Petrov"],["List entry","Ivan Petrov (alias Iван Петров)"],["Customer DOB","12 Mar 1985"],["List DOB","Unknown"],["Customer nationality","Russian"],["List regime","Russia (asset freeze)"]],
  options:[
   {t:"Clear it as a false positive — DOB doesn't match the list",good:false,fb:"The list DOB is 'Unknown', so you can't rule out a match on DOB. With matching name, nationality and a relevant regime, this needs escalation and evidence — not a quick dismissal. Treating 'unknown' as 'no match' is exactly how breaches happen."},
   {t:"Escalate for enhanced review; do not make funds available until resolved",good:true,fb:"Correct. Strong name match, relevant nationality and regime, and no data to disprove the match = escalate. You hold the account/funds and gather identifying evidence. Sanctions breaches are strict liability, so caution wins."},
   {t:"Process normally — lots of people are called Ivan Petrov",good:false,fb:"Common names cause false positives, true — but you resolve that with evidence (additional identifiers), not by assuming. Here nationality and regime align, so you cannot safely proceed."}
  ]},
 flashcards:[
  {t:"Terrorist financing (TF)",d:"Raising/moving funds to support terrorism. Money may be clean in origin — the concern is destination and purpose."},
  {t:"ML vs TF",d:"ML = disguising the proceeds of crime (origin). TF = funding terrorism (destination). TF amounts are often small."},
  {t:"Terrorism Act 2000 s.15–18",d:"Core TF offences: fund-raising, use/possession, funding arrangements, and laundering terrorist property."},
  {t:"Terrorism Act s.21A",d:"Failure to disclose suspicion of TF in the regulated sector — the TF equivalent of POCA s.330."},
  {t:"Sanctions",d:"Legal restrictions for foreign-policy/security aims against countries, entities or designated persons (e.g. asset freezes)."},
  {t:"SAMLA 2018",d:"Sanctions and Anti-Money Laundering Act — the UK's post-Brexit framework for imposing and enforcing sanctions."},
  {t:"OFSI",d:"Office of Financial Sanctions Implementation (HM Treasury) — administers UK financial sanctions and publishes the consolidated list."},
  {t:"Asset freeze",d:"A prohibition on dealing with, or making funds/economic resources available to, a designated person."},
  {t:"Strict liability (sanctions)",d:"Civil penalties for financial-sanctions breaches don't require intent — 'I didn't know' is not a defence."},
  {t:"False positive",d:"A screening alert that, on review, is not a genuine match to a listed person — resolved with evidence, not assumption."},
  {t:"Proliferation financing",d:"Funding the spread of weapons of mass destruction; an increasing AML focus and risk-assessment requirement."}
 ],
 quiz:[
  {q:"The defining feature of terrorist financing versus money laundering is that…",o:["TF always uses cash","The funds may be legitimate in origin","TF is not illegal","Only banks can commit it"],a:1,e:"TF can use clean money diverted to a harmful purpose. The concern is destination/intent, which makes it hard to detect by origin."},
  {q:"Which body administers UK financial sanctions and publishes the consolidated list?",o:["The FCA","OFSI (HM Treasury)","The NCA","The Bank of England"],a:1,e:"OFSI, part of HM Treasury, runs financial sanctions and maintains the consolidated list of designated persons."},
  {q:"'Strict liability' for financial-sanctions breaches means…",o:["You must intend to breach to be penalised","You can face a civil penalty even without intent","Sanctions never carry penalties","Only the customer is liable"],a:1,e:"Civil penalties don't require intent — lack of knowledge is not a defence. This is why continuous screening matters."},
  {q:"A screening alert shows a strong name and nationality match but an 'Unknown' list DOB. You should…",o:["Clear it — DOB doesn't match","Escalate and gather evidence; don't make funds available","Ignore the alert","Tell the customer they're sanctioned"],a:1,e:"'Unknown' can't disprove a match. Escalate, freeze/hold, and resolve with identifying evidence. (Telling the customer could also tip off.)"},
  {q:"Which is a Terrorism Act 2000 offence?",o:["s.328 arrangements","s.15 fund-raising for terrorism","s.7 failure to prevent bribery","Reg 18 risk assessment"],a:1,e:"s.15 (fund-raising) is a Terrorism Act offence. s.328 is POCA; s.7 is the Bribery Act; Reg 18 is the MLRs."},
  {q:"Proliferation financing refers to…",o:["Funding political campaigns","Funding the spread of weapons of mass destruction","Spreading false information","Multiple small deposits"],a:1,e:"PF is the financing of WMD proliferation — now an explicit part of firms' risk assessments under the MLRs."}
 ],
 reflection:"Explain to a beginner why sanctions screening can't rely on a perfect name match, and why 'I didn't know they were sanctioned' won't protect a firm. Then note one way TF detection differs from ML detection.",
 interview:[
  {q:"How does terrorist financing differ from money laundering?",a:"Laundering disguises money that came from crime — the focus is origin. Terrorist financing funds terrorism and the money can be clean to start with — the focus is destination and purpose. TF often involves small, ordinary-looking amounts, so we lean on watchlist and sanctions screening and network/contextual signals rather than transaction size."},
  {q:"What is OFSI and what would you screen against?",a:"OFSI is the Office of Financial Sanctions Implementation, part of HM Treasury. It administers UK financial sanctions and publishes the consolidated list of designated persons. We screen customers and counterparties against that list — at onboarding and on an ongoing basis — and we re-screen when the list updates, because sanctions breaches are strict liability."},
  {q:"You get a possible sanctions match. How do you handle it?",a:"I treat it seriously and don't make funds or resources available while it's unresolved. I compare all identifiers — name, aliases, DOB, nationality, regime — and gather evidence rather than dismissing on a single mismatched field. If it can't be ruled out, I escalate per procedure, and the firm may need to freeze and report to OFSI. I'm careful not to tip off the customer."}
 ]
},

 reading:[
  {h:"Fraud — the biggest crime by volume",b:`<p><strong>Fraud</strong> is dishonestly deceiving someone to make a gain or cause a loss. It's the most common crime experienced in the UK, and in fintech it shows up in a few dominant forms:</p>
   <ul>
   <li><strong>Authorised Push Payment (APP) fraud</strong> — the victim is tricked into <em>authorising</em> a payment to a fraudster (e.g. fake investment, romance scam, impersonating the bank or HMRC). Because the customer 'approved' it, it's harder to spot and recover.</li>
   <li><strong>Account Takeover (ATO)</strong> — a criminal gains control of a genuine customer's account (phishing, SIM-swap, stolen credentials) and drains it.</li>
   <li><strong>Identity / application fraud</strong> — opening accounts with stolen or synthetic identities.</li>
   </ul>
   <div class="why"><b>Why fraud and AML overlap</b>Fraud generates criminal proceeds — so the stolen money then needs laundering, often through mule accounts. Many firms now run combined 'fraud + financial crime' teams because the criminals are the same people.</div>`},
  {h:"The Bribery Act 2010 and adequate procedures",b:`<p><strong>Bribery</strong> is offering or accepting something of value to improperly influence a decision. <strong>Corruption</strong> is the broader abuse of entrusted power for private gain. The Bribery Act 2010 has four offences worth knowing:</p>
   <ul>
   <li><span class="statute">s.1</span> offering/paying a bribe</li>
   <li><span class="statute">s.2</span> requesting/receiving a bribe</li>
   <li><span class="statute">s.6</span> bribing a foreign public official</li>
   <li><span class="statute">s.7</span> <strong>failure of a commercial organisation to prevent bribery</strong> — a corporate offence</li>
   </ul>
   <p>The s.7 offence is powerful: a company is liable if someone associated with it bribes for its benefit — <em>unless</em> the company can show it had <strong>"adequate procedures"</strong> in place to prevent bribery. That's the only defence.</p>
   <div class="why"><b>Why 'adequate procedures' is a recurring theme</b>UK law increasingly says: we won't just punish the briber — we'll punish the firm that didn't try to stop them. The same 'failure to prevent' logic now applies to tax evasion and, more recently, fraud.</div>`},
  {h:"Evasion, avoidance and the facilitation offence",b:`<p>Two words people confuse:</p>
   <ul>
   <li><strong>Tax evasion</strong> — <em>illegally</em> not paying tax that is due (hiding income, fake invoices). A crime, and a predicate offence for laundering.</li>
   <li><strong>Tax avoidance</strong> — <em>legally</em> arranging affairs to reduce tax. Not a crime (though aggressive schemes attract scrutiny).</li>
   </ul>
   <p>The <span class="statute">Criminal Finances Act 2017</span> created the <strong>corporate offence of failing to prevent the facilitation of tax evasion</strong>. Like the Bribery Act, the defence is having reasonable prevention procedures.</p>
   <div class="why"><b>The pattern to remember</b>Bribery Act (2010), Criminal Finances Act (2017), and newer fraud rules all share one design: make organisations responsible for preventing crime, with a defence of having good procedures. Compliance jobs exist largely to build and run those procedures.</div>`}
 ],

 caseStudy:{firm:"APP fraud and the mule pipeline",type:"Neobank",
  body:`A retiree received a call from someone impersonating their bank's fraud team, warning of 'suspicious activity' and instructing them to move savings to a 'safe account'. They authorised three transfers totalling £42,000 — classic <strong>APP fraud</strong>.<br><br>The money landed in accounts at a neobank, then was immediately split and forwarded (layering) through mule accounts and partly converted to crypto. Because the victim had <em>authorised</em> the payments, traditional fraud blocks didn't trigger.<br><br>The neobank's inbound monitoring flagged the receiving accounts: new accounts, large unexpected inbound from an unconnected third party, instant outbound. Some funds were frozen and SARs filed. The case shows fraud and laundering as a single pipeline — and why receiving firms, not just sending firms, must monitor.`,
  lessons:["APP fraud relies on the victim authorising the payment, defeating simple blocks.","Receiving-side monitoring is critical — mules sit on the receiving end.","Fraud proceeds immediately become a laundering problem.","Speed of intervention determines whether funds can be recovered or frozen."]},
 scenario:{title:"Is this APP fraud — and what's your move?",tab:"CASE FILE · W4-S1",
  brief:"A long-standing customer suddenly makes an out-of-character large payment. Their phone behaviour looks coached. Choose the best action.",
  data:[["Customer","62, steady salary, low activity for 4 years"],["New payee","Added 6 minutes ago"],["Payment","£18,000 to 'TradeFX Holdings'"],["Session signal","On a call during the whole session"],["Customer note","'It's an investment, my advisor is helping me'"]],
  options:[
   {t:"Process it — the customer authorised it, so it's their choice",good:false,fb:"Authorised doesn't mean safe. Every signal here screams APP investment/impersonation scam: out-of-character, brand-new payee, on a call (possibly coached), 'advisor helping'. Blindly processing can complete a fraud against a vulnerable customer."},
   {t:"Pause, apply friction (warning + verification questions), and check for scam indicators before releasing",good:true,fb:"Correct. The right move is a hold + tailored warning + scam-specific questions ('Did someone tell you to move money to keep it safe?'). This is good practice for APP fraud and supports Consumer Duty obligations to avoid foreseeable harm. Escalate if indicators persist."},
   {t:"Block permanently and close the account immediately",good:false,fb:"Too blunt. You protect the customer by adding friction and verifying — not by unilaterally closing a long-standing genuine account. Closure may also tip off in a laundering context and harm a real customer."}
  ]},

  {t:"Fraud",d:"Dishonestly deceiving someone to make a gain or cause a loss. The most common crime in the UK."},
  {t:"APP fraud",d:"Authorised Push Payment fraud — the victim is tricked into authorising a payment to a criminal (e.g. fake investment, impersonation)."},
  {t:"Account takeover (ATO)",d:"A criminal gains control of a genuine customer's account via phishing, SIM-swap or stolen credentials."},
  {t:"Bribery",d:"Offering or accepting something of value to improperly influence a decision."},
  {t:"Bribery Act s.7",d:"Corporate offence of failing to prevent bribery; the only defence is having 'adequate procedures'."},
  {t:"Adequate procedures",d:"Proportionate anti-bribery controls that provide a defence to the s.7 corporate offence."},
  {t:"Tax evasion",d:"Illegally not paying tax due — a crime and a predicate offence for laundering."},
  {t:"Tax avoidance",d:"Legally minimising tax liability — not a crime (though aggressive schemes draw scrutiny)."},
  {t:"Failure to prevent (model)",d:"Legal design making firms liable for crimes by associated persons unless they had reasonable prevention procedures."},
  {t:"Dear CEO letter",d:"FCA communication to firms' senior management setting out concerns and expected actions — treated almost like a rule."}
 ],
 quiz:[
  {q:"In APP fraud, the key feature is that…",o:["The bank pays without telling the customer","The victim is tricked into authorising the payment","Only cash is used","No money moves"],a:1,e:"APP = Authorised Push Payment. The victim authorises it after being deceived, which defeats simple fraud blocks."},
  {q:"The Bribery Act s.7 offence applies to…",o:["Individuals only","Commercial organisations that fail to prevent bribery","Foreign governments","Charities exclusively"],a:1,e:"s.7 is a corporate offence: an organisation is liable for bribery by associated persons unless it had adequate procedures."},
  {q:"The only defence to the s.7 corporate bribery offence is…",o:["Ignorance","Adequate procedures to prevent bribery","A small company size","A clean prior record"],a:1,e:"Demonstrating 'adequate procedures' is the statutory defence — which is why firms build anti-bribery controls."},
  {q:"Which is legal?",o:["Tax evasion","Hiding income from HMRC","Tax avoidance","Fake invoicing"],a:2,e:"Avoidance is legal (arranging affairs to reduce tax). Evasion and hiding income/fake invoices are illegal."},
  {q:"Fraud connects to money laundering because…",o:["They are unrelated","Fraud proceeds must then be laundered, often via mules","Fraud is not a crime","Laundering happens before fraud"],a:1,e:"Fraud generates criminal proceeds that are then laundered — frequently through money-mule accounts. The pipeline is continuous."},
  {q:"A 'Dear CEO' letter is…",o:["Binding law","FCA guidance/communication of expectations to senior management","A SAR","A sanctions list"],a:1,e:"It's not a rule, but it signals FCA expectations and is taken very seriously by firms."}
 ],
 reflection:"Pick one fraud type and trace how its proceeds would be laundered. Then explain the 'failure to prevent' model in one sentence and name two laws that use it.",
 interview:[
  {q:"What's the difference between fraud and money laundering?",a:"Fraud is dishonestly deceiving someone for a gain or to cause a loss — it generates criminal proceeds. Money laundering is what happens next: disguising those proceeds. They're a single pipeline, which is why many firms combine fraud and financial-crime teams and monitor both the sending and receiving sides."},
  {q:"Explain the Bribery Act's 'failure to prevent' offence.",a:"Under s.7, a commercial organisation commits an offence if a person associated with it bribes someone to benefit the organisation. The only defence is showing it had 'adequate procedures' to prevent bribery. It shifts responsibility onto firms to actively prevent corruption, and the same model now applies to facilitating tax evasion and to fraud."},
  {q:"Tax evasion vs tax avoidance?",a:"Evasion is illegally not paying tax that's due — hiding income, fake invoices — and it's a predicate offence for laundering. Avoidance is legally arranging your affairs to reduce tax. The Criminal Finances Act 2017 also created a corporate offence of failing to prevent the facilitation of tax evasion, again with a 'reasonable procedures' defence."}

 reading:[
  {h:"Law, regulations, rules, guidance",b:`<p>UK financial-crime control is a layered stack. Knowing the layers stops you confusing 'must' with 'should'.</p>
   <ul>
   <li><strong>Primary legislation (Acts)</strong> — passed by Parliament. e.g. POCA 2002, Terrorism Act 2000, FSMA 2000, Bribery Act 2010, SAMLA 2018.</li>
   <li><strong>Secondary legislation (Regulations)</strong> — made under an Act. e.g. the <strong>Money Laundering Regulations 2017</strong> (made under powers including SAMLA). Still legally binding.</li>
   <li><strong>Regulator rules</strong> — the <strong>FCA Handbook</strong> (e.g. SYSC). Binding on authorised firms.</li>
   <li><strong>Guidance</strong> — the <strong>FCA Financial Crime Guide</strong> and <strong>JMLSG guidance</strong>. Not strictly binding, but courts and the FCA take account of whether you followed it.</li>
   </ul>
   <div class="why"><b>Why the layers matter in practice</b>An auditor or interviewer may ask 'is that a rule or guidance?' Getting the tier right shows you understand <em>obligations</em> vs <em>expectations</em> — and that you can find the source.</div>`},
  {h:"The MLRs 2017 — your daily rulebook",b:`<p>The <strong>Money Laundering, Terrorist Financing and Transfer of Funds (Information on the Payer) Regulations 2017</strong> — mercifully shortened to <strong>MLR 2017</strong> — are the operational core of AML. They tell firms what to actually do:</p>
   <ul>
   <li><span class="statute">reg 18–20</span> carry out a <strong>business-wide risk assessment</strong> and have policies, controls and procedures.</li>
   <li><span class="statute">reg 27–28</span> apply <strong>customer due diligence (CDD)</strong> — identify and verify the customer (and beneficial owners).</li>
   <li><span class="statute">reg 33</span> apply <strong>enhanced due diligence (EDD)</strong> for higher-risk situations (e.g. PEPs, high-risk countries).</li>
   <li><span class="statute">reg 37</span> simplified due diligence (SDD) for lower-risk situations.</li>
   <li>Appoint an <strong>MLRO/nominated officer</strong>, train staff, and keep records.</li>
   </ul>
   <div class="why"><b>The thread that ties it together</b>Everything is <strong>risk-based</strong>. The MLRs don't say 'treat everyone identically' — they say 'understand your risk and apply effort proportionate to it'. That single idea governs CDD, EDD and SDD (Weeks 6–8).</div>`},
  {h:"FSMA, authorisation and the Handbook",b:`<p><span class="statute">FSMA 2000</span> (Financial Services and Markets Act) is the foundation of UK financial regulation. It makes it a criminal offence to carry on a 'regulated activity' without authorisation, and it created the FCA's powers.</p>
   <p>To be <strong>authorised</strong>, a firm must meet the <strong>Threshold Conditions</strong> — minimum standards including being fit and proper, having adequate resources and effective systems. The FCA's rules live in the <strong>Handbook</strong>; the most relevant for you is <strong>SYSC</strong> (Senior Management Arrangements, Systems and Controls), which requires effective anti-financial-crime systems.</p>
   <p>On top sit the <strong>FCA Principles for Businesses</strong> — high-level rules. Principle 3 (management & control) and the newer <strong>Consumer Duty</strong> are especially relevant.</p>
   <div class="why"><b>Why authorisation is the gate</b>Authorisation is how the FCA keeps unfit firms out and holds the rest to standards. 'Is this firm authorised, and for what?' is the first question you learned to answer on the Register in Week 1.</div>`}
 ],

 caseStudy:{firm:"EMI authorisation and the Threshold Conditions",type:"Electronic Money Institution",
  body:`A start-up wanted to launch a prepaid-card and e-wallet product, requiring authorisation as an <strong>Electronic Money Institution (EMI)</strong>. Its FCA application was initially weak: a vague business-wide risk assessment, no named MLRO, and monitoring 'to be built later'.<br><br>The FCA pushed back, citing the <strong>Threshold Conditions</strong> — particularly effective systems and adequate resources. The firm had to produce a proper reg 18 risk assessment, appoint an experienced MLRO, and evidence transaction-monitoring capability <em>before</em> approval.<br><br>The lesson: financial-crime systems aren't an afterthought you bolt on post-launch — they're a condition of being allowed to operate at all.`,
  lessons:["Authorisation requires real systems and controls up front, not promises.","A reg 18 business-wide risk assessment is foundational and expected at application.","An MLRO must be appointed and credible.","The MLRs and FSMA Threshold Conditions work together at the authorisation gate."]},

 reflection:"Draw the rule hierarchy from memory (Acts → Regulations → FCA rules → guidance) with one example at each tier. Then explain why 'risk-based' is the key idea in the MLRs.",
 interview:[
  {q:"What are the Money Laundering Regulations and what do they require?",a:"The MLR 2017 are the operational core of UK AML. They require firms to carry out a business-wide risk assessment, have policies/controls/procedures, apply customer due diligence with enhanced or simplified measures depending on risk, appoint an MLRO, train staff and keep records. The unifying idea is the risk-based approach — effort proportionate to risk."},
  {q:"How does the regulatory framework fit together?",a:"At the top are Acts like POCA, FSMA and the Terrorism Act. Below them are Regulations like the MLRs. Then come FCA Handbook rules such as SYSC and the Principles, and finally guidance like the Financial Crime Guide and JMLSG. Acts and Regulations are binding; guidance isn't a rule but must be taken into account and the FCA looks at whether you followed it."},
  {q:"What's the difference between a rule and guidance?",a:"A rule — like an MLR requirement or a SYSC provision — is binding; breaching it has direct consequences. Guidance, like JMLSG or the Financial Crime Guide, sets out how to meet obligations and good practice. It isn't strictly binding, but regulators and courts consider whether you followed it, so departing from it needs a documented, reasoned justification."}

{

 reading:[
  {h:"Know Your Customer — the foundation",b:`<p><strong>KYC (Know Your Customer)</strong> is the umbrella idea: a firm must understand who its customers are. <strong>KYB (Know Your Business)</strong> is the same for corporate customers. <strong>CDD (Customer Due Diligence)</strong> is the formal process the MLRs require to achieve it.</p>
   <p>Standard CDD has four parts (think of it as a checklist for every customer):</p>
   <ol>
   <li><strong>Identify</strong> the customer — who do they say they are? (name, DOB, address; for companies, legal form and structure)</li>
   <li><strong>Verify</strong> that identity using reliable, independent sources (ID document + electronic verification, etc.)</li>
   <li><strong>Understand</strong> the purpose and intended nature of the relationship — why are they here, what will they do?</li>
   <li><strong>Monitor</strong> the relationship on an ongoing basis — keep information current and watch the activity.</li>
   </ol>
   <div class="why"><b>Why it's the foundation</b>Everything downstream — risk scoring, monitoring, SARs — depends on knowing who the customer is. Bad CDD poisons everything that follows. This is why entry-level roles are often 'KYC Analyst' or 'CDD Analyst'.</div>`},
  {h:"One size does not fit all (CDD / SDD / EDD)",b:`<p>Remember the risk-based approach from Week 5? It decides how much due diligence you apply:</p>
   <ul>
   <li><strong>Standard CDD</strong> (<span class="statute">reg 27–28</span>) — the default for normal-risk customers.</li>
   <li><strong>Simplified DD (SDD)</strong> (<span class="statute">reg 37</span>) — lighter measures where risk is demonstrably low (e.g. certain regulated, listed or government entities). You still do CDD — just proportionately less, and you must justify it.</li>
   <li><strong>Enhanced DD (EDD)</strong> (<span class="statute">reg 33</span>) — extra scrutiny where risk is higher: PEPs, customers in high-risk third countries, unusual/complex transactions, or anything that raises concern. (Week 7 covers EDD in depth.)</li>
   </ul>
   <div class="why"><b>Common beginner mistake</b>SDD is <em>not</em> 'no due diligence', and EDD is <em>not</em> a punishment — it's proportionate effort. In an interview, never say 'low risk means we skip CDD'. You always do CDD; risk just scales the depth.</div>`},
  {h:"Who really owns this?",b:`<p>For company customers, the person you're talking to may not be the person who really controls or benefits from the business. The <strong>beneficial owner (BO)</strong> is the natural person who ultimately owns or controls the customer.</p>
   <p>Under the MLRs the key test for companies is the <strong>25% threshold</strong>: a beneficial owner is generally anyone who holds <strong>more than 25%</strong> of the shares or voting rights, or who otherwise exercises control. The UK's company register reflects this through <strong>People with Significant Control (PSCs)</strong> at Companies House.</p>
   <p>You must take reasonable measures to identify the BO and verify their identity — and understand the ownership and control structure, peeling back layers of holding companies if needed.</p>
   <div class="why"><b>Why criminals love complexity</b>Layers of companies across multiple countries hide the real owner. If you can't see who ultimately benefits, you can't assess the risk — so opaque ownership is itself a red flag and often triggers EDD.</div>`}
 ],

 caseStudy:{firm:"KYB onboarding of a marketplace seller",type:"Marketplace platform / Acquirer",
  body:`A marketplace platform onboarded a company selling electronics. KYB showed a UK limited company with one listed director. But the declared trading volume was huge for a company incorporated only three weeks earlier, and Companies House showed the PSC was an overseas entity — not a person.<br><br>The analyst peeled back the structure: the overseas entity was owned by another company in a secrecy-friendly jurisdiction, with no identifiable natural-person beneficial owner. The stated business model didn't explain the projected volumes.<br><br>The platform applied EDD: requested ownership evidence, source of funds, and an explanation of the volume. When the company couldn't satisfactorily evidence its beneficial ownership, the platform declined onboarding and considered whether a SAR was warranted.`,
  lessons:["New company + high projected volume = mismatch worth probing.","A corporate PSC means you must peel back to the natural-person owner.","Inability to identify the ultimate beneficial owner can justify declining.","Declining onboarding may still prompt a SAR consideration."]},
 scenario:{title:"Onboard, EDD, or decline?",tab:"CASE FILE · W6-S1",
  brief:"A business customer wants to open an account. Review the KYB facts and choose the proportionate response.",
  data:[["Customer","Consulting Ltd — incorporated 2 weeks ago"],["Director","1 (also sole listed contact)"],["PSC at Companies House","'Global Holdings SA' (overseas entity)"],["Stated activity","Management consulting"],["Expected turnover","£3m/month"],["Beneficial owner","Not yet identified to a natural person"]],
  options:[
   {t:"Onboard with standard CDD — it's just a consultancy",good:false,fb:"Standard CDD isn't enough here. Multiple higher-risk indicators stack up: brand-new company, implausibly high turnover for a 2-week-old consultancy, a corporate PSC, and no identified natural-person beneficial owner. Defaulting to standard CDD ignores the risk-based approach."},
   {t:"Apply EDD: identify the ultimate beneficial owner, evidence source of funds, and understand the business model before deciding",good:true,fb:"Correct. The higher-risk indicators trigger enhanced due diligence under reg 33. You peel back the ownership to a natural person, evidence the source of funds, and test whether the stated activity explains the volumes. The outcome (onboard with controls, or decline) depends on what EDD reveals."},
   {t:"Decline immediately — overseas ownership is always prohibited",good:false,fb:"Overseas ownership isn't automatically prohibited; that would be 'de-risking' by reflex. The right first step is EDD to understand the structure and source of funds. You only decline if EDD can't resolve the concerns."}

 reflection:"Write the four CDD steps and a fintech example of each. Then explain, in plain English, why hidden beneficial ownership is dangerous and how Companies House helps.",
 interview:[
  {q:"What is CDD and what does it involve?",a:"Customer Due Diligence is the process of knowing your customer. It has four parts: identify the customer, verify that identity using reliable independent sources, understand the purpose and intended nature of the relationship, and monitor it on an ongoing basis. The depth scales with risk — simplified for low risk, enhanced for higher risk — but you always do CDD."},
  {q:"What's a beneficial owner and how do you find one?",a:"It's the natural person who ultimately owns or controls the customer — generally anyone with more than 25% of shares or voting rights, or who otherwise exercises control. For UK companies I'd check the People with Significant Control register at Companies House and, if a PSC is itself a company, peel back the layers until I reach a natural person. If I can't identify the ultimate owner, that's a red flag."},
  {q:"What's the difference between simplified and enhanced due diligence?",a:"Both are CDD scaled to risk. Simplified due diligence applies lighter, justified measures where risk is demonstrably low — it's not skipping checks. Enhanced due diligence applies extra scrutiny where risk is higher, like PEPs, high-risk countries or complex structures: things like establishing source of funds and getting senior approval. The risk-based approach decides which applies."}
 ]
},

 reading:[
  {h:"Enhanced due diligence in practice",b:`<p>EDD is standard CDD <em>plus</em> extra measures, applied when risk is higher. Typical additions:</p>
   <ul>
   <li>Obtain <strong>additional identity and ownership information</strong> and verify it more rigorously.</li>
   <li>Establish the <strong>source of funds</strong> and, where relevant, <strong>source of wealth</strong>.</li>
   <li>Obtain <strong>senior management approval</strong> to start or continue the relationship.</li>
   <li>Apply <strong>more intensive ongoing monitoring</strong> of transactions.</li>
   <li>Understand the <strong>reasons</strong> for intended or actual transactions.</li>
   </ul>
   <p>EDD is mandatory in defined situations under <span class="statute">reg 33</span>: PEPs, customers established in high-risk third countries, unusually complex or large transactions with no obvious purpose, and any case the firm assesses as higher risk.</p>
   <div class="why"><b>Why senior sign-off matters</b>Requiring a senior manager to approve higher-risk relationships forces accountability up the chain — it's not just the junior analyst's call. This links straight to the SM&CR you'll meet in Week 11.</div>`},
  {h:"PEPs — risk, not guilt",b:`<p>A <strong>Politically Exposed Person (PEP)</strong> is someone entrusted with a prominent public function — heads of state, ministers, senior officials, senior judges, central-bank governors, senior military, etc. The category also covers their <strong>family members</strong> and known <strong>close associates</strong>.</p>
   <p>Why the extra care? A prominent public position creates a higher <em>risk</em> of bribery and corruption. PEP status is <strong>not an accusation</strong> — it means apply EDD: identify the PEP, get senior approval, establish source of wealth/funds, and monitor more closely.</p>
   <p>UK guidance (and <span class="statute">reg 35</span>) stresses a <strong>proportionate</strong> approach — especially for <em>domestic</em> PEPs, who should generally be treated as lower risk than foreign PEPs unless other risk factors apply. The FCA has been explicit that firms must not treat ordinary domestic PEPs (or their families) unfairly.</p>
   <div class="why"><b>The professional mindset</b>'PEP' triggers process, not prejudice. Over-blocking PEPs is a real compliance failing the FCA has criticised. You manage the risk — you don't punish the person.</div>`},
  {h:"Source of funds vs source of wealth",b:`<p>These two phrases sound similar and trip up beginners constantly:</p>
   <ul>
   <li><strong>Source of Funds (SoF)</strong> — where the <em>specific money</em> in this transaction or account came from <em>right now</em>. e.g. 'proceeds of selling a flat last month', 'salary from employer X'.</li>
   <li><strong>Source of Wealth (SoW)</strong> — how the customer accumulated their <em>overall wealth</em> over time. e.g. 'built and sold a business', 'inheritance', 'career earnings'.</li>
   </ul>
   <p>Evidencing them means corroboration, not just assertion: payslips, sale contracts, company accounts, tax documents, inheritance papers. A bank statement alone shows money <em>arrived</em> — not where it truly originated.</p>
   <div class="why"><b>Why both matter</b>A customer might have a clean source of funds for one payment but an unexplained mountain of overall wealth — or vice versa. EDD often needs both to make sense of the picture, especially for PEPs and large transactions.</div>`}
 ],

  {q:"What is a PEP and how should one be handled?",a:"A Politically Exposed Person holds a prominent public function — and the category extends to family members and close associates. It signals higher corruption risk, so it triggers enhanced due diligence: senior approval, establishing source of wealth and funds, and enhanced ongoing monitoring. It's not an accusation, and the FCA expects proportionate treatment — domestic PEPs with no other risk factors are generally lower risk and shouldn't be refused by reflex."},

 reading:[
  {h:"Risk is the engine of AML",b:`<p>Everything you've learned bolts onto one idea: <strong>assess the risk, then act proportionately</strong>. Risk assessment happens at two levels:</p>
   <ul>
   <li><strong>Customer risk assessment</strong> — how risky is <em>this</em> customer? Drives whether they get SDD, standard CDD or EDD, and how closely you monitor them.</li>
   <li><strong>Business-wide risk assessment (BWRA)</strong> — how risky is the <em>whole firm's</em> exposure, given its products, customers, markets and channels? Drives the firm's overall control framework.</li>
   </ul>
   <p>The five standard risk-factor categories you'll see everywhere:</p>
   <ol><li><strong>Customer</strong> (type, PEP status, behaviour, ownership complexity)</li><li><strong>Product/service</strong> (cash, crypto, cross-border payments = higher)</li><li><strong>Geography</strong> (high-risk jurisdictions, sanctions exposure)</li><li><strong>Channel/delivery</strong> (non-face-to-face, remote onboarding = higher)</li><li><strong>Transaction</strong> (size, frequency, patterns)</li></ol>
   <div class="why"><b>Why beginners must internalise this</b>If an interviewer asks 'how would you risk-rate a customer?', they want these categories and the logic that more risk = more due diligence and monitoring. It's the spine of the whole profession.</div>`},
  {h:"Scoring a customer",b:`<p>Most firms convert risk factors into a <strong>score</strong> that maps to a rating — typically <span class="tag ok">low</span> <span class="tag gold">medium</span> <span class="tag risk">high</span>. Each factor contributes; some factors (like a sanctions hit or unexplained PEP wealth) can override and force high risk regardless of the rest.</p>
   <p>The rating then drives:</p>
   <ul><li>Depth of due diligence (SDD / CDD / EDD)</li><li>Frequency of periodic review (e.g. high-risk reviewed annually, low-risk less often)</li><li>Monitoring sensitivity (tighter thresholds for higher-risk customers)</li></ul>
   <div class="why"><b>Why scoring must be explainable</b>A regulator can ask 'why is this customer medium not high?'. Black-box scores that nobody can explain are a finding. Good analysts can articulate the 'why' behind a rating.</div>`},
  {h:"The reg 18 business-wide assessment",b:`<p><span class="statute">reg 18</span> of the MLRs requires every firm to make and document a <strong>business-wide risk assessment</strong>: a written analysis of the ML/TF risks the firm faces across customers, products, geographies, channels and transactions, taking account of information from the FCA and bodies like the National Risk Assessment.</p>
   <p>From the BWRA flow the firm's <span class="statute">reg 19</span> <strong>policies, controls and procedures</strong> and <span class="statute">reg 20</span> group-wide arrangements. It must be kept up to date and approved by senior management.</p>
   <p>Key concept: <strong>inherent risk</strong> (risk before controls) → apply <strong>controls</strong> → <strong>residual risk</strong> (what's left). The firm sets a <strong>risk appetite</strong> for how much residual risk it will accept.</p>
   <div class="why"><b>Why the BWRA is foundational</b>It's the document the FCA asks for first. If a firm can't show a credible, current business-wide risk assessment, everything else looks like guesswork. It's the 'why' behind every control the firm runs.</div>`}
 ],
